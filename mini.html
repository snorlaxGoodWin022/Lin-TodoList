<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>番茄钟 - 迷你窗口</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: transparent;
        -webkit-app-region: drag;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow: hidden;
      }
      .mini-window {
        background: rgba(30, 30, 30, 0.95);
        border-radius: 12px;
        padding: 12px 16px;
        color: white;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .time {
        font-size: 20px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        min-width: 50px;
        text-align: center;
      }
      .mode {
        font-size: 12px;
        opacity: 0.7;
      }
      .controls {
        display: flex;
        gap: 4px;
        -webkit-app-region: no-drag;
      }
      .btn {
        width: 28px;
        height: 28px;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
        font-size: 14px;
      }
      .btn-play {
        background: #10b981;
        color: white;
      }
      .btn-play:hover {
        background: #059669;
      }
      .btn-pause {
        background: #f59e0b;
        color: white;
      }
      .btn-pause:hover {
        background: #d97706;
      }
      .btn-close {
        background: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.7);
      }
      .btn-close:hover {
        background: #ef4444;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="mini-window">
      <div>
        <div class="time" id="time">25:00</div>
        <div class="mode" id="mode">专注时间</div>
      </div>
      <div class="controls">
        <button class="btn btn-play" id="btnPlay" title="开始">▶</button>
        <button class="btn btn-close" id="btnClose" title="关闭">✕</button>
      </div>
    </div>

    <script>
      const { ipcRenderer } = require('electron')

      let isRunning = false
      let timeLeft = 25 * 60
      let isFocusMode = true

      const timeEl = document.getElementById('time')
      const modeEl = document.getElementById('mode')
      const btnPlay = document.getElementById('btnPlay')
      const btnClose = document.getElementById('btnClose')

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60)
        const s = seconds % 60
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`
      }

      const updateDisplay = () => {
        timeEl.textContent = formatTime(timeLeft)
        modeEl.textContent = isFocusMode ? '专注时间' : '休息时间'
        btnPlay.textContent = isRunning ? '⏸' : '▶'
        btnPlay.className = isRunning ? 'btn btn-pause' : 'btn btn-play'
      }

      let timerInterval = null

      const startTimer = () => {
        if (timerInterval) return
        isRunning = true
        updateDisplay()
        timerInterval = setInterval(() => {
          if (timeLeft > 0) {
            timeLeft--
            updateDisplay()
            ipcRenderer.send('pomodoro:tick', { timeLeft, isFocusMode })
          } else {
            completeSession()
          }
        }, 1000)
      }

      const pauseTimer = () => {
        if (timerInterval) {
          clearInterval(timerInterval)
          timerInterval = null
        }
        isRunning = false
        updateDisplay()
      }

      const completeSession = () => {
        pauseTimer()
        ipcRenderer.send('pomodoro:complete', { isFocusMode })
        // Switch mode
        isFocusMode = !isFocusMode
        timeLeft = isFocusMode ? 25 * 60 : 5 * 60
        updateDisplay()
      }

      btnPlay.addEventListener('click', () => {
        if (isRunning) {
          pauseTimer()
        } else {
          startTimer()
        }
      })

      btnClose.addEventListener('click', () => {
        ipcRenderer.send('mini-window:close')
      })

      // Listen for commands from main window
      ipcRenderer.on('pomodoro:update', (event, data) => {
        timeLeft = data.timeLeft
        isFocusMode = data.isFocusMode
        updateDisplay()
      })

      ipcRenderer.on('pomodoro:start', () => {
        startTimer()
      })

      ipcRenderer.on('pomodoro:pause', () => {
        pauseTimer()
      })

      updateDisplay()
    </script>
  </body>
</html>
